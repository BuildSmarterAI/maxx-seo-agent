name: seo-learn
on:
  schedule:
    - cron: "0 8 * * 1"        # weekly, Monday 08:00 UTC (after the weekend's nightly runs)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: seo-learn
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci

      - name: Write GCP key
        run: printf '%s' '${{ secrets.GCP_SA_JSON }}' > "${{ github.workspace }}/gcp.json"

      - name: Collect outcomes → attribute → reprioritize
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp.json
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
          SITE_URL: ${{ vars.SITE_URL || '' }}
          GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          # optional: CITATIONS_CSV checked into the repo or produced by a prior step
        run: |
          node scripts/collect-outcomes.mjs
          node scripts/attribute.mjs
          node scripts/attribute-conversions.mjs
          node scripts/prioritize.mjs
          node scripts/push-escalations.mjs

      # RO-1 weekly judge calibration (matches the roadmap cadence). Refreshes the eval_set
      # benchmark, then scores the judge against it and RECORDS a recommendation to
      # judge_calibration. Informational only — it never gates a merge and never swaps the
      # judge config (a human ratifies via the JUDGE_* vars). continue-on-error so a model
      # blip can't fail the attribution job above. Needs ANTHROPIC_API_KEY for the judge calls.
      - name: Eval-set + judge calibration
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL || 'claude-haiku-4-5-20251001' }}
          JUDGE_MIN_SCORE: ${{ vars.JUDGE_MIN_SCORE || '3' }}
          EVAL_BENCH_LIMIT: ${{ vars.EVAL_BENCH_LIMIT || '60' }}
        run: |
          node scripts/build-eval-set.mjs
          node scripts/judge-calibrate.mjs

      - name: Remove key
        if: always()
        run: rm -f "${{ github.workspace }}/gcp.json"
