name: eval-gate
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - run: npm ci

      - run: git fetch origin ${{ github.base_ref }}

      # Enforcement applies ONLY to bot-authored safe-class PRs (label seo-auto).
      # Human PRs pass this gate automatically so it can stay a required check.
      - name: Diff-size guard
        if: contains(github.event.pull_request.labels.*.name, 'seo-auto')
        env:
          BASE_REF: origin/${{ github.base_ref }}
          MAX_DIFF_LINES: ${{ vars.MAX_DIFF_LINES }}
        run: node scripts/check-diff-size.mjs

      # Deterministic guard for known live-defect classes (leaked placeholders, raw-slug
      # H1s, default bylines — see AUTORESEARCH-PHASE-A.md / ACTION-PLAN.md). Runs BEFORE
      # the LLM judge: cheaper, fail-closed, and independent of judge calibration.
      - name: Content guards
        if: contains(github.event.pull_request.labels.*.name, 'seo-auto')
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          files=$(git diff --name-only --diff-filter=ACM "$BASE_REF"...HEAD -- 'drafts/*.md' '*.html')
          if [ -z "$files" ]; then
            echo "content-guards: no content files changed → pass."
          else
            echo "content-guards: checking:"; echo "$files"
            node scripts/check-content-guards.mjs $files
          fi

      # Deterministic citation-worthiness gate (KDD '24 GEO markers: statistics, sourced
      # quotations, outbound citations — see AGENTIC-AI-SEO-RESEARCH.md). Runs after the
      # content guards / before the LLM judge on bot-authored content PRs only (seo-auto),
      # so human PRs pass automatically and it can stay a required check. Diff-scoped: skips
      # when no draft/HTML content changed. Deterministic + dependency-free (no API call).
      - name: Citation density guard
        if: contains(github.event.pull_request.labels.*.name, 'seo-auto')
        env:
          BASE_REF: origin/${{ github.base_ref }}
          TARGET_DOMAIN: ${{ vars.TARGET_DOMAIN }}
          MIN_STATS_PER_1K: ${{ vars.MIN_STATS_PER_1K }}
          MIN_QUOTES: ${{ vars.MIN_QUOTES }}
          MIN_CITATIONS: ${{ vars.MIN_CITATIONS }}
        run: |
          files=$(git diff --name-only --diff-filter=ACM "$BASE_REF"...HEAD -- 'drafts/*.md' '*.html')
          if [ -z "$files" ]; then
            echo "citation-density: no content files changed → pass."
          else
            echo "citation-density: checking:"; echo "$files"
            node scripts/check-citation-density.mjs $files
          fi

      # Deterministic artifact validators (audit H2/M6). Unlike the judge steps these run
      # on EVERY PR — they are lint-grade facts (leaked OPERATOR_INSERT_* placeholders,
      # broken JSON-LD, metadata cap/duplicate/canonical violations), not judgement, and
      # they are diff-scoped so PRs that touch neither surface pass at zero cost. The
      # shipped placeholder schema arrived via a human-path commit, so seo-auto-only
      # enforcement would not have caught it.
      - name: Artifact validators (schema JSON-LD + metadata CSV)
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          schema=$(git diff --name-only --diff-filter=ACM "$BASE_REF"...HEAD -- 'schema/*.jsonld')
          if [ -n "$schema" ]; then
            echo "validating changed schema artifacts:"; echo "$schema"
            node scripts/validate-json.mjs $schema
          else
            echo "artifact-validators: no schema changes → skip."
          fi
          csv=$(git diff --name-only --diff-filter=ACM "$BASE_REF"...HEAD -- metadata-changes.csv)
          if [ -n "$csv" ]; then
            node scripts/validate-metadata-csv.mjs
          else
            echo "artifact-validators: no metadata-changes.csv change → skip."
          fi

      - name: LLM-as-judge
        if: contains(github.event.pull_request.labels.*.name, 'seo-auto')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: origin/${{ github.base_ref }}
          JUDGE_MODEL: claude-haiku-4-5-20251001
          JUDGE_MIN_SCORE: ${{ vars.JUDGE_MIN_SCORE }}
        run: node scripts/eval-judge.mjs

      - name: Human PR notice
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'seo-auto') }}
        run: echo "Non-bot PR — eval-gate enforcement skipped (human review path)."
